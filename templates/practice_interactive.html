<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Interactive SQL Practice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .header h1 { color: #333; font-size: 24px; }
        .header .back {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat .number { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat .number.green { color: #10b981; }
        .stat .number.gold { color: #f59e0b; }
        .stat .number.red { color: #ef4444; }
        .stat .label { font-size: 12px; color: #888; margin-top: 4px; }
        
        .progress {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }
        
        .question-box {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .question-box .topic {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .question-box .difficulty {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        .diff-beginner { background: #d4edda; color: #155724; }
        .diff-intermediate { background: #fff3cd; color: #856404; }
        .diff-advanced { background: #f8d7da; color: #721c24; }
        .diff-expert { background: #d1ecf1; color: #0c5460; }
        .question-text { font-size: 18px; line-height: 1.6; color: #333; margin: 15px 0; }
        
        .hint-box {
            display: none;
            background: #fff3cd;
            border: 2px solid #f59e0b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .hint-box.show { display: block; }
        .hint-box .penalty { color: #dc3545; font-size: 14px; margin-top: 5px; }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            min-height: 120px;
            resize: vertical;
        }
        textarea:focus { border-color: #667eea; outline: none; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(16,185,129,0.4); }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,158,11,0.4); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(239,68,68,0.4); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,117,125,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        
        .feedback {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
        }
        .feedback.show { display: block; }
        .feedback.correct { background: #d4edda; border: 2px solid #10b981; }
        .feedback.incorrect { background: #f8d7da; border: 2px solid #ef4444; }
        .feedback .score { font-size: 24px; font-weight: 700; margin: 10px 0; }
        .feedback .correct-answer {
            font-family: monospace;
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }
        
        .badge {
            display: inline-block;
            background: #dc3545;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }
        
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .setup-grid input {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .setup-grid label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
        
        @media (max-width: 600px) {
            .setup-grid { grid-template-columns: 1fr 1fr; }
            .stats { grid-template-columns: 1fr 1fr; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Setup Screen -->
    <div class="card" id="setupScreen">
        <div class="header">
            <h1>🎯 Interactive SQL Practice</h1>
            <a href="/" class="back">🏠 Back</a>
        </div>
        <p style="color:#666; margin-bottom:20px;">Practice SQL with real questions, instant feedback, and scoring!</p>
        
        <div style="margin:20px 0;">
            <label style="font-weight:600; display:block; margin-bottom:5px;">Your Name</label>
            <input type="text" id="userName" value="Anonymous" style="width:100%; padding:10px; border:2px solid #e2e8f0; border-radius:8px; font-size:14px;">
        </div>
        
        <div style="margin:20px 0;">
            <label style="font-weight:600; display:block; margin-bottom:5px;">Questions per Difficulty</label>
            <div class="setup-grid">
                <div><label>⭐ Beginner</label><input type="number" id="beginnerCount" value="3" min="0" max="20"></div>
                <div><label>⭐⭐ Intermediate</label><input type="number" id="intermediateCount" value="3" min="0" max="20"></div>
                <div><label>⭐⭐⭐ Advanced</label><input type="number" id="advancedCount" value="2" min="0" max="20"></div>
                <div><label>⭐⭐⭐⭐ Expert</label><input type="number" id="expertCount" value="1" min="0" max="20"></div>
            </div>
        </div>
        
        <button class="btn btn-success" onclick="startPractice()" style="width:100%; justify-content:center; padding:14px; font-size:16px;">
            🚀 Start Practice
        </button>
    </div>

    <!-- Practice Screen -->
    <div class="card" id="practiceScreen" style="display:none;">
        <div class="header">
            <h1>🎯 SQL Practice</h1>
            <button class="btn btn-danger" onclick="saveAndClose()" style="padding:6px 16px; font-size:12px;">💾 Save & Close</button>
        </div>
        
        <div class="stats">
            <div class="stat"><div class="number" id="scoreDisplay">0</div><div class="label">Score</div></div>
            <div class="stat"><div class="number" id="answeredDisplay">0</div><div class="label">Answered</div></div>
            <div class="stat"><div class="number green" id="correctDisplay">0</div><div class="label">Correct</div></div>
            <div class="stat"><div class="number gold" id="accuracyDisplay">0%</div><div class="label">Accuracy</div></div>
            <div class="stat"><div class="number red" id="hintsDisplay">0</div><div class="label">Hints Used</div></div>
        </div>
        
        <div class="progress"><div class="fill" id="progressBar" style="width:0%"></div></div>
        
        <div class="question-box">
            <div>
                <span class="topic" id="questionTopic">Topic</span>
                <span class="difficulty" id="questionDifficulty">Difficulty</span>
                <span class="badge" id="hintBadge" style="display:none;">💡 Hint Used</span>
            </div>
            <div class="question-text" id="questionText">Loading...</div>
        </div>
        
        <div class="hint-box" id="hintBox">
            <strong>💡 Hint:</strong> <span id="hintText"></span>
            <div class="penalty">⚠️ -20 points penalty for using hint</div>
        </div>
        
        <textarea id="answerInput" placeholder="Write your SQL query here..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-success" id="submitBtn" onclick="submitAnswer()">📤 Submit</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none;">➡️ Next</button>
            <button class="btn btn-warning" id="hintBtn" onclick="getHint()">💡 Hint (-20)</button>
            <button class="btn btn-secondary" onclick="skipQuestion()">⏭️ Skip</button>
        </div>
        
        <div class="feedback" id="feedback">
            <h3 id="feedbackTitle"></h3>
            <div class="score" id="scoreDisplayFeedback"></div>
            <div id="feedbackExplanation"></div>
            <div class="correct-answer" id="correctAnswer"></div>
            <div id="feedbackTip"></div>
        </div>
    </div>

</div>

<script>
    let sessionId = null;
    let currentQuestion = null;
    let isAnswered = false;
    let hintUsed = false;

    function startPractice() {
        const name = document.getElementById('userName').value || 'Anonymous';
        const beginner = parseInt(document.getElementById('beginnerCount').value) || 0;
        const intermediate = parseInt(document.getElementById('intermediateCount').value) || 0;
        const advanced = parseInt(document.getElementById('advancedCount').value) || 0;
        const expert = parseInt(document.getElementById('expertCount').value) || 0;
        
        if (beginner + intermediate + advanced + expert === 0) {
            alert('Please select at least one question!');
            return;
        }
        
        fetch('/api/practice/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                user_name: name,
                schema_file: 'examples/ecommerce.sql',
                beginner: beginner,
                intermediate: intermediate,
                advanced: advanced,
                expert: expert
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                alert('Error: ' + data.error);
                return;
            }
            sessionId = data.session_id;
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('practiceScreen').style.display = 'block';
            loadQuestion();
        })
        .catch(e => alert('Error: ' + e));
    }

    function loadQuestion() {
        fetch('/api/practice/question/' + sessionId)
        .then(r => r.json())
        .then(data => {
            if (data.complete) {
                document.getElementById('questionText').textContent = '🎉 Practice Complete!';
                document.getElementById('answerInput').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'none';
                document.getElementById('hintBtn').style.display = 'none';
                return;
            }
            
            currentQuestion = data.question;
            document.getElementById('questionText').textContent = currentQuestion.question;
            document.getElementById('questionTopic').textContent = currentQuestion.topic;
            document.getElementById('questionDifficulty').textContent = currentQuestion.difficulty;
            document.getElementById('questionDifficulty').className = 'difficulty diff-' + currentQuestion.difficulty.toLowerCase();
            
            document.getElementById('answerInput').value = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('hintBox').className = 'hint-box';
            document.getElementById('hintBadge').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('hintBtn').disabled = false;
            isAnswered = false;
            hintUsed = false;
            
            updateStats(data.stats);
        })
        .catch(e => alert('Error: ' + e));
    }

    function getHint() {
        if (isAnswered) {
            alert('Already answered!');
            return;
        }
        
        fetch('/api/practice/hint/' + sessionId)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            hintUsed = true;
            document.getElementById('hintBox').className = 'hint-box show';
            document.getElementById('hintText').textContent = data.hint;
            document.getElementById('hintBadge').style.display = 'inline-block';
            document.getElementById('hintBtn').disabled = true;
            alert('💡 Hint shown! -20 points penalty!');
        })
        .catch(e => alert('Error: ' + e));
    }

    function submitAnswer() {
        if (isAnswered) {
            alert('Already answered! Click Next.');
            return;
        }
        
        const answer = document.getElementById('answerInput').value.trim();
        if (!answer) {
            alert('Please write your SQL query!');
            return;
        }
        
        fetch('/api/practice/answer/' + sessionId, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({answer: answer})
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            
            isAnswered = true;
            const result = data.result;
            
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback show';
            
            if (result.is_correct && result.total_score >= 80) {
                feedback.className += ' correct';
                document.getElementById('feedbackTitle').textContent = '✅ Correct!';
            } else if (result.is_correct) {
                feedback.className += ' correct';
                document.getElementById('feedbackTitle').textContent = '✅ Correct (Hint penalty)';
            } else {
                feedback.className += ' incorrect';
                document.getElementById('feedbackTitle').textContent = '❌ Incorrect';
            }
            
            document.getElementById('scoreDisplayFeedback').textContent = `Score: ${result.total_score}/100`;
            document.getElementById('feedbackExplanation').textContent = '📖 ' + (result.explanation || '');
            document.getElementById('correctAnswer').innerHTML = `<strong>Correct Answer:</strong><br>${result.correct_answer}`;
            document.getElementById('feedbackTip').textContent = '💡 ' + (result.tip || '');
            
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
            document.getElementById('hintBtn').disabled = true;
            
            updateStats(data.stats);
            
            if (data.complete) {
                document.getElementById('questionText').textContent = '🎉 Practice Complete!';
                document.getElementById('answerInput').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'none';
            }
        })
        .catch(e => alert('Error: ' + e));
    }

    function nextQuestion() {
        if (!isAnswered) {
            alert('Please answer first!');
            return;
        }
        
        fetch('/api/practice/next/' + sessionId, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.complete) {
                document.getElementById('questionText').textContent = '🎉 Practice Complete!';
                document.getElementById('answerInput').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'none';
                return;
            }
            
            currentQuestion = data.question;
            document.getElementById('questionText').textContent = currentQuestion.question;
            document.getElementById('questionTopic').textContent = currentQuestion.topic;
            document.getElementById('questionDifficulty').textContent = currentQuestion.difficulty;
            document.getElementById('questionDifficulty').className = 'difficulty diff-' + currentQuestion.difficulty.toLowerCase();
            
            document.getElementById('answerInput').value = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('hintBox').className = 'hint-box';
            document.getElementById('hintBadge').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('hintBtn').disabled = false;
            isAnswered = false;
            hintUsed = false;
            
            updateStats(data.stats);
        })
        .catch(e => alert('Error: ' + e));
    }

    function skipQuestion() {
        if (!isAnswered && !confirm('Skip without answering?')) return;
        fetch('/api/practice/next/' + sessionId, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.complete) {
                document.getElementById('questionText').textContent = '🎉 Practice Complete!';
                document.getElementById('answerInput').style.display = 'none';
                document.getElementById('nextBtn').style.display = 'none';
                return;
            }
            loadQuestion();
        });
    }

    function updateStats(stats) {
        if (!stats) return;
        document.getElementById('scoreDisplay').textContent = stats.correct || 0;
        document.getElementById('answeredDisplay').textContent = stats.answered || 0;
        document.getElementById('correctDisplay').textContent = stats.correct || 0;
        document.getElementById('accuracyDisplay').textContent = stats.accuracy || '0%';
        document.getElementById('hintsDisplay').textContent = stats.total_hints_used || 0;
        
        const progress = stats.total_questions > 0 ? (stats.answered / stats.total_questions * 100) : 0;
        document.getElementById('progressBar').style.width = Math.min(100, progress) + '%';
    }

    function saveAndClose() {
        if (!sessionId) return;
        alert('💾 Session saved! You can resume later.');
        document.getElementById('practiceScreen').style.display = 'none';
        document.getElementById('setupScreen').style.display = 'block';
        sessionId = null;
    }
</script>

</body>
</html>
