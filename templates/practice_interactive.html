<!DOCTYPE html>
<html>
<head><title>🎯 SQL Practice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:center}
.container{max-width:900px;width:100%}
.card{background:rgba(255,255,255,0.95);border-radius:20px;padding:30px;margin:15px 0;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
.header h1{font-size:28px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:#667eea;text-decoration:none;font-weight:600;padding:8px 16px;border-radius:10px;background:rgba(102,126,234,0.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:15px 0}
.form-group label{display:block;font-weight:600;color:#333;font-size:14px;margin-bottom:4px}
.form-group input{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px}
.form-group input:focus{border-color:#667eea;outline:none;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.15)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-success{background:#10b981;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-secondary{background:#6c757d;color:#fff}
.btn-info{background:#3b82f6;color:#fff}
.btn-pink{background:#ec4899;color:#fff}
.btn-start{background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:18px;padding:14px 30px;width:100%;justify-content:center}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}
.toolbar .btn{flex:1;min-width:80px;justify-content:center}
.question-box{background:linear-gradient(135deg,#f8f9ff,#eef0ff);border-radius:16px;padding:25px;margin:20px 0;border-left:5px solid #667eea}
.question-box .topic{display:inline-block;background:#667eea;color:#fff;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600}
.question-box .difficulty{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-left:8px}
.diff-beginner{background:#d4edda;color:#155724}
.diff-intermediate{background:#fff3cd;color:#856404}
.diff-advanced{background:#f8d7da;color:#721c24}
.diff-expert{background:#d1ecf1;color:#0c5460}
.question-text{font-size:18px;line-height:1.6;color:#1e293b;margin:12px 0 0 0}
textarea{width:100%;min-height:130px;padding:15px;border:2px solid #e2e8f0;border-radius:12px;font-family:'Courier New',monospace;font-size:15px;resize:vertical;background:#fff}
textarea:focus{border-color:#667eea;outline:none;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.feedback{padding:20px;border-radius:12px;margin:15px 0;display:none}
.feedback.show{display:block}
.feedback.correct{background:#d4edda;border:2px solid #10b981}
.feedback.incorrect{background:#f8d7da;border:2px solid #ef4444}
.feedback.partial{background:#fff3cd;border:2px solid #f59e0b}
.feedback h4{margin-bottom:8px}
.feedback .correct-answer{background:#fff;padding:10px 14px;border-radius:8px;font-family:monospace;margin:8px 0}
.score-details{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0}
.score-item{background:#fff;padding:12px;border-radius:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.score-item .value{font-size:24px;font-weight:700}
.score-item .label{font-size:12px;color:#888}
.score-item .value.green{color:#10b981}
.score-item .value.red{color:#ef4444}
.score-item .value.gold{color:#f59e0b}
.score-item .value.blue{color:#3b82f6}
.stats-bar{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.stats-bar .stat{display:flex;align-items:center;gap:6px;font-size:14px;color:#333;background:#f8f9ff;padding:6px 14px;border-radius:20px}
.stats-bar .stat .num{font-weight:700;color:#667eea}
.hidden{display:none!important}
.debug-box{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:10px;font-family:monospace;font-size:11px;white-space:pre-wrap;margin-top:15px;max-height:150px;overflow-y:auto}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.score-details{grid-template-columns:1fr 1fr}.toolbar .btn{flex:1 1 45%}.header h1{font-size:22px}.card{padding:20px}}
</style>
</head>
<body>
<div class="container">
<div class="card"><div class="header"><h1>🎯 SQL Practice</h1><a href="/">🏠 Back</a></div></div>
<div class="card" id="setupCard">
<h2>🚀 Start Practice</h2>
<div class="form-group"><label>Your Name</label><input type="text" id="userName" value="Anonymous"></div>
<div class="form-grid">
<div><label>⭐ Beginner</label><input type="number" id="beginner" value="2" min="0"></div>
<div><label>⭐⭐ Intermediate</label><input type="number" id="intermediate" value="2" min="0"></div>
<div><label>⭐⭐⭐ Advanced</label><input type="number" id="advanced" value="1" min="0"></div>
<div><label>⭐⭐⭐⭐ Expert</label><input type="number" id="expert" value="0" min="0"></div>
</div>
<button class="btn btn-start" id="startBtn">🚀 Start Practice</button>
<div id="debugLog" class="debug-box">Ready.</div>
</div>
<div class="card hidden" id="practiceCard">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
<h3 id="questionNum">Question 1 of 10</h3>
<div class="stats-bar">
<span class="stat">✅ <span class="num" id="scoreDisplay">0</span></span>
<span class="stat">📝 <span class="num" id="answeredDisplay">0</span></span>
<span class="stat">💡 <span class="num" id="hintDisplay">0</span></span>
</div>
</div>
<div class="question-box">
<div><span class="topic" id="topicDisplay">Topic</span><span class="difficulty" id="diffDisplay">Difficulty</span></div>
<div class="question-text" id="questionText">Loading...</div>
</div>
<textarea id="answerInput" placeholder="Write your SQL query here..."></textarea>
<div class="toolbar">
<button class="btn btn-success" id="submitBtn">📤 Submit</button>
<button class="btn btn-warning" id="hintBtn">💡 Hint</button>
<button class="btn btn-secondary" id="skipBtn">⏭️ Skip</button>
<button class="btn btn-info" id="saveBtn">💾 Save</button>
<button class="btn btn-pink" id="exportBtn">📥 Export</button>
<button class="btn btn-danger" id="endBtn">🏁 End</button>
</div>
<div id="feedback" class="feedback"></div>
<div id="scoreDetails" class="score-details" style="display:none"></div>
</div>
</div>
<script>
(function(){
var debugLog=document.getElementById('debugLog');
function log(msg){debugLog.textContent+='\n['+new Date().toLocaleTimeString()+'] '+msg;debugLog.scrollTop=debugLog.scrollHeight;console.log(msg);}
log('🟢 Page loaded');
var setupCard=document.getElementById('setupCard');
var practiceCard=document.getElementById('practiceCard');
var startBtn=document.getElementById('startBtn');
var userName=document.getElementById('userName');
var beginner=document.getElementById('beginner');
var intermediate=document.getElementById('intermediate');
var advanced=document.getElementById('advanced');
var expert=document.getElementById('expert');
var questionNum=document.getElementById('questionNum');
var scoreDisplay=document.getElementById('scoreDisplay');
var answeredDisplay=document.getElementById('answeredDisplay');
var hintDisplay=document.getElementById('hintDisplay');
var topicDisplay=document.getElementById('topicDisplay');
var diffDisplay=document.getElementById('diffDisplay');
var questionText=document.getElementById('questionText');
var answerInput=document.getElementById('answerInput');
var feedback=document.getElementById('feedback');
var scoreDetails=document.getElementById('scoreDetails');
var submitBtn=document.getElementById('submitBtn');
var hintBtn=document.getElementById('hintBtn');
var skipBtn=document.getElementById('skipBtn');
var saveBtn=document.getElementById('saveBtn');
var exportBtn=document.getElementById('exportBtn');
var endBtn=document.getElementById('endBtn');
var sessionId=null,currentQuestion=null,isAnswered=false;
startBtn.addEventListener('click',function(){
var name=userName.value||'Anonymous';
var b=parseInt(beginner.value)||0;
var i=parseInt(intermediate.value)||0;
var a=parseInt(advanced.value)||0;
var e=parseInt(expert.value)||0;
if(b+i+a+e===0){alert('Select at least one question!');return;}
startBtn.disabled=true;startBtn.textContent='⏳ Loading...';
fetch('/api/practice/start',{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({user_name:name,beginner:b,intermediate:i,advanced:a,expert:e})
}).then(r=>r.json()).then(data=>{
if(data.error){alert('Error: '+data.error);startBtn.disabled=false;startBtn.textContent='🚀 Start Practice';return;}
sessionId=data.session_id;log('✅ Session: '+sessionId);
setupCard.classList.add('hidden');practiceCard.classList.remove('hidden');loadQuestion();
}).catch(e=>{alert('Error: '+e.message);startBtn.disabled=false;startBtn.textContent='🚀 Start Practice';});
});
function loadQuestion(){
log('📥 Loading question');
fetch('/api/practice/question/'+sessionId).then(r=>r.json()).then(data=>{
if(data.complete){questionText.textContent='🎉 Practice Complete!';answerInput.style.display='none';submitBtn.disabled=true;hintBtn.disabled=true;return;}
currentQuestion=data.question;
questionNum.textContent='Question '+data.question.id+' of '+data.stats.total_questions;
questionText.textContent=currentQuestion.question;
topicDisplay.textContent=currentQuestion.topic;
diffDisplay.textContent=currentQuestion.difficulty;
diffDisplay.className='difficulty diff-'+currentQuestion.difficulty.toLowerCase();
answerInput.value='';
feedback.className='feedback';feedback.style.display='none';
scoreDetails.style.display='none';
isAnswered=false;
updateStats(data.stats);
log('✅ Question loaded: '+currentQuestion.id);
}).catch(e=>{alert('Error loading question: '+e.message);});
}
submitBtn.addEventListener('click',function(){
if(isAnswered){alert('Already answered! Click Skip.');return;}
var answer=answerInput.value.trim();
if(!answer){alert('Write your SQL query!');return;}
log('📤 Submitting answer');
submitBtn.disabled=true;submitBtn.textContent='⏳ ...';
fetch('/api/practice/answer/'+sessionId,{
method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({answer:answer})
}).then(r=>r.json()).then(data=>{
submitBtn.disabled=false;submitBtn.textContent='📤 Submit';
if(data.error){alert('Error: '+data.error);return;}
isAnswered=true;
var result=data.result;
feedback.style.display='block';
if(result.is_correct){
feedback.className='feedback correct show';
feedback.innerHTML='<h4>✅ Correct!</h4><p>Score: <strong>'+result.total_score+'/100</strong></p>';
}else{
feedback.className='feedback incorrect show';
feedback.innerHTML='<h4>❌ Incorrect</h4><p>Score: <strong>'+result.total_score+'/100</strong></p>'+
'<div class="correct-answer"><strong>Correct Answer:</strong><br>'+result.correct_answer+'</div>';
}
if(result.explanation)feedback.innerHTML+='<p><strong>Explanation:</strong> '+result.explanation+'</p>';
if(result.tip)feedback.innerHTML+='<p><strong>💡 Tip:</strong> '+result.tip+'</p>';
if(result.syntax_score!==undefined){
scoreDetails.style.display='grid';
scoreDetails.innerHTML=`
<div class="score-item"><div class="value green">${result.syntax_score}</div><div class="label">Syntax</div></div>
<div class="score-item"><div class="value blue">${result.grammar_score}</div><div class="label">Grammar</div></div>
<div class="score-item"><div class="value gold">${result.keyword_score}</div><div class="label">Keywords</div></div>
<div class="score-item"><div class="value red">${result.structure_score}</div><div class="label">Structure</div></div>
`;
}
updateStats(data.stats);
if(data.complete){questionText.textContent='🎉 Practice Complete!';answerInput.style.display='none';submitBtn.disabled=true;hintBtn.disabled=true;}
else{setTimeout(loadQuestion,2500);}
}).catch(e=>{submitBtn.disabled=false;submitBtn.textContent='📤 Submit';alert('Error: '+e.message);});
});
hintBtn.addEventListener('click',function(){
if(isAnswered){alert('Already answered!');return;}
fetch('/api/practice/hint/'+sessionId).then(r=>r.json()).then(data=>{
if(data.error){alert('Error: '+data.error);return;}
alert('💡 Hint: '+data.hint+'\n(-20 points penalty)');
log('💡 Hint shown');
}).catch(e=>{alert('Error: '+e.message);});
});
skipBtn.addEventListener('click',function(){
if(!isAnswered&&!confirm('Skip without answering?'))return;
loadQuestion();log('⏭️ Skipped');
});
saveBtn.addEventListener('click',function(){
if(!sessionId){alert('No active session!');return;}
log('💾 Saving...');
fetch('/api/practice/save/'+sessionId,{method:'POST'}).then(r=>r.json()).then(data=>{
if(data.success){alert('✅ Session saved!');log('✅ Saved');}
else{alert('Error: '+data.error);}
}).catch(e=>{alert('Error: '+e.message);});
});
exportBtn.addEventListener('click',function(){
if(!sessionId){alert('No active session!');return;}
log('📥 Exporting...');
window.open('/api/practice/export/'+sessionId,'_blank');
});
endBtn.addEventListener('click',function(){
if(confirm('End practice?')){
practiceCard.classList.add('hidden');
setupCard.classList.remove('hidden');
sessionId=null;
startBtn.disabled=false;startBtn.textContent='🚀 Start Practice';
log('🏁 Ended');
}
});
function updateStats(stats){if(!stats)return;scoreDisplay.textContent=stats.correct;answeredDisplay.textContent=stats.answered;hintDisplay.textContent=stats.total_hints_used||0;}
})();
</script>
</body>
</html>
